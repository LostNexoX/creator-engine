<!DOCTYPE html>
<html>
<head>
    <title>Creator Engine</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body>

<h1>Creator Engine 🚀</h1>

<form method="POST">

    <input type="text"
           name="niche"
           placeholder="Niche"
           required>

    <br><br>

    <input type="text"
           name="goal"
           placeholder="Goal"
           required>

    <br><br>

    <select name="platform">
        <option>Instagram Reels</option>
        <option>TikTok</option>
        <option>YouTube Shorts</option>
    </select>

    <br><br>

    <select name="hook_type">
        <option>Curiosity</option>
        <option>Controversial</option>
        <option>Story</option>
        <option>Fear</option>
        <option>Authority</option>
        <option>Problem/Solution</option>
    </select>

    <br><br>

    <button type="submit">
        Generate Hooks
    </button>

</form>

{% if hooks %}
<h2>Hooks</h2>
<pre>{{ hooks }}</pre>
{% endif %}

</body>
</html>
