<!DOCTYPE html>
<html>
<head>
    <title>Creator Engine</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body{
            font-family: Arial;
            padding:20px;
            max-width:700px;
            margin:auto;
        }

        input,select,button{
            width:100%;
            padding:12px;
            margin-top:10px;
            font-size:16px;
        }

        #result{
            white-space:pre-wrap;
            border:1px solid #ddd;
            padding:15px;
            margin-top:20px;
            border-radius:10px;
        }

        #copyBtn{
            margin-top:15px;
            display:none;
        }
    </style>
</head>
<body>

<h1>Creator Engine 🚀</h1>

<form method="POST">

    <input
        type="text"
        name="niche"
        placeholder="Niche"
        required>

    <input
        type="text"
        name="goal"
        placeholder="Goal"
        required>

    <select name="platform">
        <option>Instagram Reels</option>
        <option>TikTok</option>
        <option>YouTube Shorts</option>
    </select>

    <select name="hook_type">
        <option>Curiosity</option>
        <option>Controversial</option>
        <option>Story</option>
        <option>Fear</option>
        <option>Authority</option>
        <option>Problem/Solution</option>
    </select>

    <button
        type="submit"
        name="mode"
        value="premium">
        Generate 3 Premium Hooks
    </button>

    <button
        type="submit"
        name="mode"
        value="more">
        Generate 7 More Hooks
    </button>

    <p id="loading" style="display:none;">
        Generating hooks...
    </p>

</form>

{% if error %}
<p>{{ error }}</p>
{% endif %}

<div id="result">{{ hooks }}</div>

<button id="copyBtn">
    Copy Hooks
</button>

<script>
document.querySelector("form").addEventListener("submit", function () {
    document.getElementById("loading").style.display = "block";
});

const result = document.getElementById("result");
const copyBtn = document.getElementById("copyBtn");

if(result.innerText.trim() !== ""){
    copyBtn.style.display = "block";
}

copyBtn.addEventListener("click", function () {
    navigator.clipboard.writeText(result.innerText);

    copyBtn.innerText = "Copied ✅";

    setTimeout(function(){
        copyBtn.innerText = "Copy Hooks";
    },2000);
});
</script>

</body>
</html>
